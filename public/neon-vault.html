<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEON-VAULT | Master Safecracker</title>
    
    <!-- PWA Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#030305">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2091/2091665.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=JetBrains+Mono:wght@400;700&display=swap');
        
        :root {
            --neon-green: #00ffc8;
            --neon-pink: #ff0055;
            --gold: #ffd700;
        }

        body {
            margin: 0;
            overflow: hidden;
            background-color: #030305;
            font-family: 'Syncopate', sans-serif;
            color: #fff;
            user-select: none;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            touch-action: none;
        }

        #game-container { 
            position: relative; 
            width: 100vw; 
            height: 100vh; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            max-width: 600px;
            max-height: 800px;
        }

        canvas {
            display: block;
            filter: drop-shadow(0 0 20px rgba(0, 255, 200, 0.2));
            width: 90vw;
            height: 90vw;
            max-width: 500px;
            max-height: 500px;
            cursor: pointer;
        }

        .hud {
            position: absolute;
            top: env(safe-area-inset-top, 20px);
            width: 100%;
            text-align: center;
            pointer-events: none;
            z-index: 10;
        }

        .loot-val {
            font-size: 10vw;
            font-weight: 700;
            color: var(--gold);
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.6);
            letter-spacing: -1px;
            line-height: 1;
        }
        @media (min-width: 600px) { .loot-val { font-size: 4rem; } }

        .multiplier-display {
            color: var(--neon-pink);
            font-size: 1.5rem;
            font-weight: 700;
            text-shadow: 0 0 15px var(--neon-pink);
            font-family: 'JetBrains Mono', monospace;
        }

        .security-meter {
            font-size: 0.6rem;
            color: var(--neon-pink);
            letter-spacing: 2px;
            margin-top: 5px;
            opacity: 0.8;
            font-weight: bold;
        }

        .career-stat {
            position: absolute;
            left: 20px;
            bottom: 100px;
            text-align: left;
            font-size: 0.55rem;
            opacity: 0.6;
            letter-spacing: 1px;
            line-height: 1.5;
            background: rgba(0,0,0,0.5);
            padding: 8px;
            border-radius: 4px;
            pointer-events: none;
        }

        /* Shop UI - Adapted for Mobile */
        .shop-trigger {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(10, 10, 15, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px;
            width: 120px;
            pointer-events: auto;
            border-radius: 8px;
            z-index: 50;
            transition: transform 0.3s ease;
        }

        /* Responsive toggle for shop on small screens */
        @media (max-width: 768px) {
            .shop-trigger {
                right: -130px;
            }
            .shop-trigger.active {
                transform: translate(-140px, -50%);
            }
            .shop-toggle-btn {
                display: block !important;
            }
        }

        .shop-toggle-btn {
            display: none;
            position: absolute;
            left: -40px;
            top: 10px;
            width: 35px;
            height: 35px;
            background: var(--neon-green);
            color: #000;
            border-radius: 4px 0 0 4px;
            text-align: center;
            line-height: 35px;
            font-size: 1.2rem;
            cursor: pointer;
        }

        .shop-item {
            font-size: 0.6rem;
            margin-bottom: 12px;
            padding: 8px 4px;
            border-bottom: 1px solid #333;
            cursor: pointer;
        }
        .shop-item:hover { background: rgba(0, 255, 200, 0.1); }
        .price { color: var(--gold); font-family: 'JetBrains Mono'; }

        .controls {
            position: absolute;
            bottom: env(safe-area-inset-bottom, 20px);
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            padding-bottom: 10px;
        }

        .btn-cashout {
            background: rgba(0, 255, 200, 0.1);
            border: 2px solid var(--neon-green);
            color: var(--neon-green);
            padding: 15px 50px;
            font-size: 1rem;
            font-family: 'Syncopate', sans-serif;
            cursor: pointer;
            transition: all 0.2s;
            pointer-events: auto;
            text-transform: uppercase;
            border-radius: 100px;
            width: 80%;
            max-width: 300px;
        }

        .btn-cashout:active {
            background: var(--neon-green);
            color: #000;
            box-shadow: 0 0 40px var(--neon-green);
            transform: scale(0.95);
        }

        #flash {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.1s;
        }

        .glitch { animation: glitch 0.2s infinite; }
        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }
    </style>
</head>
<body>

    <div id="flash"></div>

    <div id="game-container">
        <div class="career-stat">
            REPUTATION<br>
            <span id="careerScore" class="text-white font-bold">$0</span><br>
            WANTED LEVEL<br>
            <span id="wantedLevel" class="text-white font-bold">NOVICE</span>
        </div>

        <div class="hud">
            <div class="text-[8px] opacity-40 tracking-[5px]">UNSECURED</div>
            <div id="loot" class="loot-val">$0</div>
            <div id="bank" class="text-[#00ffc8] text-[10px] mt-1 opacity-80">AVAILABLE: $0</div>
            <div id="multDisplay" class="multiplier-display mt-1">X1</div>
            <div id="securityDisplay" class="security-meter">HEAT: LEVEL 1</div>
            <div id="perfectLabel" class="text-[10px] text-white opacity-0 transition-opacity mt-1">PERFECT +200%</div>
        </div>

        <div class="shop-trigger" id="shopPanel">
            <div class="shop-toggle-btn" onclick="toggleShop()">🛒</div>
            <div class="text-[8px] opacity-50 mb-3 tracking-widest">BLACK MARKET</div>
            <div class="shop-item" onclick="buyUpgrade('stabilizer')">STABILIZER<br><span class="price">$5k</span></div>
            <div class="shop-item" onclick="buyUpgrade('drill')">WIDER DRILL<br><span class="price">$10k</span></div>
            <div class="shop-item" onclick="buyUpgrade('insurance')">INSURANCE<br><span class="price">$25k</span></div>
            <div class="text-[7px] opacity-30 mt-2">PERMANENT HEAT</div>
        </div>

        <canvas id="vault"></canvas>

        <div class="controls">
            <button id="cashoutBtn" class="btn-cashout">EXTRACT</button>
            <div class="instructions text-[7px] opacity-30 tracking-[2px]">TAP TO DRILL LAYER</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('vault');
        const ctx = canvas.getContext('2d');
        const lootEl = document.getElementById('loot');
        const bankEl = document.getElementById('bank');
        const multDisplay = document.getElementById('multDisplay');
        const securityDisplay = document.getElementById('securityDisplay');
        const careerScoreEl = document.getElementById('careerScore');
        const wantedLevelEl = document.getElementById('wantedLevel');
        const perfectLabel = document.getElementById('perfectLabel');
        const flashEl = document.getElementById('flash');
        const cashoutBtn = document.getElementById('cashoutBtn');
        const shopPanel = document.getElementById('shopPanel');

        // Responsive Sizing
        let width = 600; 
        let height = 600;
        canvas.width = width; 
        canvas.height = height;

        // State
        let loot = 0; let banked = 0;
        let careerTotal = 0;
        let layer = 1; const maxLayers = 3;
        let rotation = 0; let lastHitRotation = 0; let decoysRotation = 0;
        let speed = 0.04; let speedMult = 1;
        let particles = [];
        let targetAngle = Math.random() * Math.PI * 2;
        let targetWidth = 0.45;
        let decoys = [];

        // Upgrades
        let upgrades = { stabilizer: 0, drill: 0, insurance: false };

        // Audio
        let audioCtx = null;
        function playSfx(freq, type = 'sine', dur = 0.1, vol = 0.1) {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const osc = audioCtx.createOscillator();
                const g = audioCtx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                g.gain.setValueAtTime(vol, audioCtx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + dur);
                osc.connect(g); g.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + dur);
            } catch(e) {}
        }

        function triggerFlash(color = 'white', opacity = '0.2') {
            flashEl.style.backgroundColor = color;
            flashEl.style.opacity = opacity;
            setTimeout(() => flashEl.style.opacity = '0', 100);
        }

        function toggleShop() {
            shopPanel.classList.toggle('active');
        }

        function buyUpgrade(type) {
            const prices = { stabilizer: 5000, drill: 10000, insurance: 25000 };
            if (banked >= prices[type]) {
                banked -= prices[type];
                if (type === 'insurance') upgrades.insurance = true;
                else upgrades[type]++;
                updateUI();
                playSfx(1200, 'sine', 0.4, 0.1);
                triggerFlash('#ffd700', '0.1');
            } else {
                playSfx(100, 'sawtooth', 0.2);
            }
        }

        function spawnDecoys() {
            decoys = [];
            let baseDecoys = (layer - 1);
            let reputationDecoys = Math.floor(careerTotal / 75000); 
            let totalDecoys = Math.min(8, baseDecoys + reputationDecoys);

            for(let i=0; i < totalDecoys; i++) {
                decoys.push(Math.random() * Math.PI * 2);
            }

            securityDisplay.innerText = `HEAT: LEVEL ${Math.min(10, reputationDecoys + 1)}`;
            
            if (careerTotal < 50000) wantedLevelEl.innerText = "NOVICE";
            else if (careerTotal < 200000) wantedLevelEl.innerText = "SUSPECT";
            else if (careerTotal < 500000) wantedLevelEl.innerText = "PROFESSIONAL";
            else if (careerTotal < 1000000) wantedLevelEl.innerText = "MASTER THIEF";
            else wantedLevelEl.innerText = "PUBLIC ENEMY #1";
        }

        function checkHit() {
            if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
            
            const normalizedRot = rotation % (Math.PI * 2);
            let hitDecoy = false;
            decoys.forEach(dAngle => {
                const d = (dAngle + decoysRotation) % (Math.PI * 2);
                const diff = Math.min(Math.abs(normalizedRot - d), Math.abs(normalizedRot - (d + Math.PI * 2)), Math.abs(normalizedRot - (d - Math.PI * 2)));
                if (diff < 0.12) hitDecoy = true;
            });

            if (hitDecoy) { fail(true); return; }

            const diff = Math.min(Math.abs(normalizedRot - targetAngle), Math.abs(normalizedRot - (targetAngle + Math.PI * 2)), Math.abs(normalizedRot - (targetAngle - Math.PI * 2)));
            const currentTargetWidth = targetWidth + (upgrades.drill * 0.05);

            if (diff < currentTargetWidth / 2) {
                const isPerfect = diff < 0.04;
                success(isPerfect);
            } else {
                fail(false);
            }
        }

        function success(perfect) {
            const rotationSinceLast = rotation - lastHitRotation;
            if (rotationSinceLast < Math.PI * 2) {
                speedMult++;
            } else {
                speedMult = 1;
            }

            let baseGain = layer * 500;
            if (perfect) {
                baseGain *= 2;
                perfectLabel.style.opacity = '1';
                setTimeout(() => perfectLabel.style.opacity = '0', 800);
            }

            loot += baseGain * speedMult;
            lastHitRotation = rotation;
            
            if (layer < maxLayers) {
                layer++;
                speed += Math.max(0.005, 0.015 - (upgrades.stabilizer * 0.003));
                targetAngle = Math.random() * Math.PI * 2;
                spawnDecoys();
                playSfx(400 + (layer * 100) + (speedMult * 50), 'square', 0.2);
                triggerFlash('#00ffc8');
                createExplosion('#00ffc8');
            } else {
                bankLoot();
                playSfx(800, 'sine', 0.5, 0.2);
                triggerFlash('#ffd700', '0.4');
                createExplosion('#ffd700', 50);
                resetVault();
            }
            updateUI();
        }

        function fail(isCritical) {
            playSfx(80, 'sawtooth', 0.5, 0.2);
            triggerFlash('red', '0.5');
            
            loot = 0;
            if (isCritical) {
                if (upgrades.insurance) {
                    banked = Math.floor(banked * 0.5);
                    upgrades.insurance = false;
                } else {
                    banked = 0;
                }
            }
            
            speedMult = 1;
            resetVault();
            updateUI();
            
            document.body.classList.add('glitch');
            setTimeout(() => document.body.classList.remove('glitch'), 300);
        }

        function bankLoot() {
            banked += loot;
            careerTotal += loot;
            loot = 0;
            speedMult = 1;
            updateUI();
        }

        function resetVault() {
            layer = 1;
            speed = 0.04 - (upgrades.stabilizer * 0.005);
            targetWidth = 0.45;
            targetAngle = Math.random() * Math.PI * 2;
            spawnDecoys();
            lastHitRotation = rotation;
        }

        function updateUI() {
            lootEl.innerText = `$${loot.toLocaleString()}`;
            bankEl.innerText = `AVAILABLE: $${banked.toLocaleString()}`;
            careerScoreEl.innerText = `$${careerTotal.toLocaleString()}`;
            multDisplay.innerText = `X${speedMult}`;
            if (speedMult > 5) multDisplay.classList.add('glitch');
            else multDisplay.classList.remove('glitch');
        }

        function createExplosion(color, count = 20) {
            const radius = 200 - (layer * 40);
            for(let i=0; i<count; i++) {
                particles.push({
                    x: width/2 + Math.cos(rotation) * radius,
                    y: height/2 + Math.sin(rotation) * radius,
                    vx: (Math.random() - 0.5) * 12, vy: (Math.random() - 0.5) * 12,
                    life: 1.0, color: color
                });
            }
        }

        function draw() {
            ctx.fillStyle = '#030305';
            ctx.fillRect(0, 0, width, height);
            const cx = width / 2; const cy = height / 2;

            rotation += speed;
            decoysRotation -= speed * 0.5;

            if (rotation - lastHitRotation > Math.PI * 2 && speedMult > 1) {
                speedMult = 1;
                updateUI();
                playSfx(200, 'sine', 0.2, 0.05);
            }

            for (let i = 1; i <= maxLayers; i++) {
                const radius = 200 - (i * 40);
                const isActive = (i === layer);

                ctx.beginPath();
                ctx.arc(cx, cy, radius, 0, Math.PI * 2);
                ctx.strokeStyle = isActive ? 'rgba(255, 255, 255, 0.1)' : 'rgba(255, 255, 255, 0.02)';
                ctx.lineWidth = 15;
                ctx.stroke();

                if (isActive) {
                    const rotLeft = (Math.PI * 2) - (rotation - lastHitRotation);
                    if (rotLeft > 0) {
                        ctx.beginPath();
                        ctx.arc(cx, cy, radius + 12, rotation, rotation + rotLeft);
                        ctx.strokeStyle = `rgba(255, 0, 85, ${speedMult > 1 ? 0.6 : 0.1})`;
                        ctx.lineWidth = 3;
                        ctx.stroke();
                    }

                    const currentTargetWidth = targetWidth + (upgrades.drill * 0.05);
                    ctx.beginPath();
                    ctx.arc(cx, cy, radius, targetAngle - currentTargetWidth/2, targetAngle + currentTargetWidth/2);
                    ctx.strokeStyle = '#00ffc8';
                    ctx.lineWidth = 20;
                    ctx.stroke();

                    decoys.forEach(dAngle => {
                        const d = (dAngle + decoysRotation);
                        ctx.beginPath();
                        ctx.arc(cx, cy, radius, d - 0.06, d + 0.06);
                        ctx.strokeStyle = '#ff0055';
                        ctx.lineWidth = 26;
                        ctx.stroke();
                    });

                    const rx = cx + Math.cos(rotation) * radius;
                    const ry = cy + Math.sin(rotation) * radius;
                    ctx.fillStyle = '#fff';
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = '#fff';
                    ctx.beginPath(); ctx.arc(rx, ry, 9, 0, Math.PI * 2); ctx.fill();
                    ctx.shadowBlur = 0;
                }
            }

            particles = particles.filter(p => {
                p.x += p.vx; p.y += p.vy; p.life -= 0.02;
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, 3, 3);
                return p.life > 0;
            });
            ctx.globalAlpha = 1;

            requestAnimationFrame(draw);
        }

        // Touch and Mouse listeners
        canvas.addEventListener('touchstart', (e) => { 
            e.preventDefault(); 
            checkHit(); 
        }, {passive: false});

        canvas.addEventListener('mousedown', (e) => { 
            checkHit(); 
        });

        window.addEventListener('keydown', (e) => { if(e.code === 'Space') checkHit(); });
        
        cashoutBtn.addEventListener('click', (e) => { 
            e.stopPropagation();
            if (loot > 0) { bankLoot(); playSfx(1000, 'sine', 0.3, 0.1); resetVault(); updateUI(); } 
        });

        draw();
    </script>
</body>
</html>
